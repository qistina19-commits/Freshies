<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKitchen AI | AI Purchasing Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #2e5e4e; color: #1f1f1f; }
        .glass { background: #fffae3; color: #1f1f1f; backdrop-filter: blur(12px); border: 1px solid rgba(196, 162, 131, 0.4); }
        .row-hover:hover { background: rgba(220, 210, 195, 0.95); }
        
        /* PDF-specific styling */
        @media print {
            body { background: white; }
            .glass { background: #f5eee2; }
            #exportPdf { display: none; }
            nav { display: none; }
        }
    </style>
</head>
<body class="p-8">

    <nav class="flex justify-between items-center py-6 px-8 glass mb-8 rounded-2xl mx-auto max-w-6xl mt-4">
        <div class="font-bold text-xl">SmartKitchen AI</div>
        <div class="flex gap-6 text-sm text-gray-600">
            <a href="dashboard.html" class="hover:text-gray-900 transition">Dashboard</a>
            <a href="inventory.html" class="hover:text-gray-900 transition">Inventory</a>
            <a href="waste.html" class="hover:text-gray-900 transition">Waste</a>
            <a href="aidecision.html" class="hover:text-gray-900 transition">AI Engine</a>
            <a href="purchasing.html" class="font-semibold text-gray-900">Purchasing</a>
            <a href="reports.html" class="hover:text-gray-900 transition">Reports</a>
            <a href="settings.html" class="hover:text-gray-900 transition">Settings</a>
        </div>
        <a href="loginpage.html" class="text-xs bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition text-gray-700">Sign Out</a>
    </nav>

    <div id="pdf-content" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Purchasing Assistant</h1>
                <p class="text-slate-100">AI-optimized procurement based on 7-day demand.</p>
                <p class="text-slate-200 text-sm mt-2" id="generatedDate"></p>
            </div>
            <button id="exportPdf" class="bg-white text-black px-6 py-2 rounded-xl font-medium hover:bg-gray-200">Export PDF</button>
        </header>

        <div class="glass rounded-3xl overflow-hidden mb-8">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 text-sm">
                    <tr>
                        <th class="p-6">Ingredient</th>
                        <th class="p-6">Urgency</th>
                        <th class="p-6">Est. Cost</th>
                        <th class="p-6">AI Rationale</th>
                    </tr>
                </thead>
                <tbody id="purchaseTableBody" class="divide-y divide-white/5">
                    <!-- Rows will be inserted here dynamically -->
                </tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-xl font-semibold mb-4">Procurement Summary</h3>
                <div class="flex justify-between py-2 border-b border-white/10">
                    <span class="text-gray-400">Total Estimated Cost</span>
                    <span class="font-bold" id="totalCost">RM 0</span>
                </div>
                <div class="flex justify-between py-2">
                    <span class="text-gray-400">AI Projected Savings</span>
                    <span class="text-green-400 font-bold" id="totalSavings">RM 0</span>
                </div>
            </div>
            <button id="generatePurchaseBtn" class="glass p-8 rounded-3xl flex flex-col items-center justify-center hover:bg-white/5 transition border-dashed border-2 border-white/20">
                <span class="text-2xl font-bold">Generate Purchase List</span>
                <span class="text-gray-400 mt-2">Send to Suppliers</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // Data structure for purchasing items
        let purchasingData = {
            items: [
                {
                    ingredient: 'Organic Tomatoes',
                    urgency: 'High',
                    cost: 145,
                    rationale: 'Stock low + weekend demand peak expected.'
                },
                {
                    ingredient: 'Whole Chicken',
                    urgency: 'Medium',
                    cost: 320,
                    rationale: 'Standard replenishment for recurring Tuesday volume.'
                }
            ],
            projectedSavings: 82
        };

        // Function to get urgency badge color
        function getUrgencyColor(urgency) {
            const colors = {
                'High': 'bg-red-500/20 text-red-500',
                'Medium': 'bg-yellow-500/20 text-yellow-600',
                'Low': 'bg-green-500/20 text-green-500'
            };
            return colors[urgency] || colors['Medium'];
        }

        // Function to render the table
        function renderTable(data) {
            const tbody = document.getElementById('purchaseTableBody');
            tbody.innerHTML = '';

            data.items.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'row-hover';
                row.innerHTML = `
                    <td class="p-6 font-medium">${item.ingredient}</td>
                    <td class="p-6"><span class="px-3 py-1 rounded-full ${getUrgencyColor(item.urgency)} text-xs">${item.urgency}</span></td>
                    <td class="p-6">RM ${item.cost}</td>
                    <td class="p-6 text-sm text-slate-700">${item.rationale}</td>
                `;
                tbody.appendChild(row);
            });

            updateSummary(data);
        }

        // Function to update the summary
        function updateSummary(data) {
            const totalCost = data.items.reduce((sum, item) => sum + item.cost, 0);
            document.getElementById('totalCost').textContent = `RM ${totalCost}`;
            document.getElementById('totalSavings').textContent = `RM ${data.projectedSavings}`;
        }

        // Function to update data from external source
        function updatePurchasingData(newData) {
            purchasingData = newData;
            renderTable(purchasingData);
        }

        // Function to set generated date
        function setGeneratedDate() {
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('generatedDate').textContent = `Generated: ${formattedDate}`;
        }

        // Export PDF function with improved styling
        document.getElementById('exportPdf').addEventListener('click', function () {
            const element = document.getElementById('pdf-content');
            const filename = `purchasing-assistant-${new Date().toISOString().split('T')[0]}.pdf`;
            
            const opt = {
                margin: [10, 10, 10, 10],
                filename: filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'avoid-all' }
            };
            
            html2pdf()
                .set(opt)
                .from(element)
                .save()
                .catch(error => console.error('Error generating PDF:', error));
        });

        // Generate Purchase List button
        document.getElementById('generatePurchaseBtn').addEventListener('click', function () {
            const totalCost = purchasingData.items.reduce((sum, item) => sum + item.cost, 0);
            const csvData = convertToCSV(purchasingData.items);
            
            console.log('Generating purchase list...');
            console.log(purchasingData);
            
            // Log CSV format for easy copying to suppliers
            console.log('CSV Format:\n' + csvData);
            
            // Optional: Automatically download as CSV
            downloadCSV(csvData, `purchase-list-${new Date().toISOString().split('T')[0]}.csv`);
        });

        // Helper function to convert data to CSV
        function convertToCSV(items) {
            let csv = 'Ingredient,Urgency,Est. Cost (RM),AI Rationale\n';
            items.forEach(item => {
                csv += `"${item.ingredient}","${item.urgency}","${item.cost}","${item.rationale}"\n`;
            });
            return csv;
        }

        // Helper function to download CSV file
        function downloadCSV(csv, filename) {
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        // Initialize the page with default data
        renderTable(purchasingData);
        setGeneratedDate();

        // Example: Fetch data from API (uncomment and modify with your backend URL)
        /*
        async function fetchPurchasingData() {
            try {
                const response = await fetch('/api/purchasing-data');
                const data = await response.json();
                updatePurchasingData(data);
                setGeneratedDate();
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Call this when the page loads or set up auto-refresh
        window.addEventListener('load', fetchPurchasingData);
        */

    </script>
</body>
</html>
